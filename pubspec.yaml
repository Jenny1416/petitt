name: petitt
version: 1.0.0+1
publish_to: 'none'
description: Aplicación móvil e-commerce PETIT para productos y accesorios de mascotas.

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/products.json
    - assets/images/onboarding_01.jpg
    - assets/images/onboarding_bg.jpg
    - assets/images/onboarding_02.png
    - assets/images/promo_01.jpg
    - assets/images/promo_02.jpg
    - assets/images/promo_03.jpg